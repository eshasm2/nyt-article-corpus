name: Fetch Articles

on:
  workflow_dispatch:   # manual trigger to start the chain; re-triggered automatically after each run

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch script
        run: python fetch_wayback.py

      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fetched/ count.json
          git diff --cached --quiet || git commit -m "chore: fetch articles [skip ci]"
          git push

  trigger-next:
    needs: fetch
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 65

    permissions:
      actions: write

    steps:
      - name: Wait 1 hour then start next run
        run: |
          sleep 3600
          gh workflow run fetch.yml --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
