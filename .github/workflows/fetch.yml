name: Fetch Articles

on:
  workflow_dispatch:          # manual trigger to start the chain
  workflow_run:
    workflows: ["Fetch Articles"]
    types: [completed]        # fires on success, failure, cancel, or timeout

jobs:
  wait:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run'   # skip wait on manual trigger
    timeout-minutes: 65
    steps:
      - name: Wait 1 hour
        run: sleep 3600

  fetch:
    needs: [wait]
    if: always() && (needs.wait.result == 'success' || needs.wait.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 355

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch script
        run: python fetch_wayback.py

      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add success.json count.json
          git diff --cached --quiet || git commit -m "chore: fetch articles [skip ci]"
          git push
